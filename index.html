<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1.0,maximum-scale=1.0"
  />
  <title>TimoETA – KMB</title>
  <!-- immediately apply saved theme -->
  <script>
    (function(){
      const t = localStorage.getItem('theme');
      if (t === 'dark')
        document.documentElement.classList.add('dark-mode');
    })();
  </script>
  <link rel="stylesheet" href="styles/style.css"/>
</head>
<body>
  <div class="container fade-in">
    <header class="fade-in">
      <h1>TimoETA – KMB</h1>
      <div class="header-controls">
        <div class="theme-switch-wrapper">
          <!-- dark‐mode toggle -->
          <label class="theme-switch">
            <input type="checkbox" id="themeToggle"/>
            <span class="slider"></span>
          </label>
          <span class="theme-label">Dark Mode</span>
          <!-- language selector -->
          <label for="langSelect" class="lang-label">Language</label>
          <select id="langSelect" class="material-select">
            <option value="en">English</option>
            <option value="tc">繁體</option>
            <option value="sc">简体</option>
          </select>
        </div>
      </div>
    </header>

    <form id="searchForm">
      <div class="controls fade-in">
        <div>
          <label id="labelStopName" for="stopName">
            Stop Name (partial)
          </label>
          <input
            type="text"
            id="stopName"
            placeholder="e.g. Kai Yip Estate"
            required
          />
        </div>
        <div>
          <label id="labelRouteNumbers" for="routeNumbers">
            Route Numbers (comma-sep, optional)
          </label>
          <input
            type="text"
            id="routeNumbers"
            placeholder="e.g. 14, 62X, A41, P905"
          />
        </div>
        <button type="submit" class="btn-primary ripple">
          Search ETAs
        </button>
      </div>
    </form>

    <div id="results"></div>

    <footer class="app-footer fade-in">
      Made by Timothy
    </footer>
  </div>

  <script src="src/app.js"></script>
</body>
</html>
