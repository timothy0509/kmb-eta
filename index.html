<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KMB Real-Time ETA</title>
    <link rel="stylesheet" href="style.css" />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1281799248088821"
      crossorigin="anonymous"
    ></script>
    <meta name="google-adsense-account" content="ca-pub-1281799248088821" />
  </head>
  <body>
    <div class="container">
      <div class="header-controls">
        <h1>KMB Real-Time Bus ETA</h1>
        <div class="theme-switch-wrapper">
          <label class="theme-switch" for="darkModeToggle">
            <input type="checkbox" id="darkModeToggle" />
            <span class="slider round"></span>
          </label>
          <span class="theme-label">Dark Mode</span>
        </div>
        <div class="theme-switch-wrapper">
          <label class="theme-switch" for="countdownToggle">
            <input type="checkbox" id="countdownToggle" />
            <span class="slider round"></span>
          </label>
          <span class="theme-label">ETA Countdown</span>
        </div>
      </div>

      <div class="controls">
        <div>
          <label for="stop-name-input">Bus Stop Name (EN/CN):</label>
          <input
            type="text"
            id="stop-name-input"
            placeholder="e.g., Tsim Sha Tsui or 尖沙咀"
          />
        </div>
        <div>
          <label for="route-filter-input">Filter Routes (optional):</label>
          <input
            type="text"
            id="route-filter-input"
            placeholder="e.g., 1A,271"
          />
        </div>
        <div class="grouping-control">
          <input type="checkbox" id="smart-grouping-checkbox" />
          <label for="smart-grouping-checkbox">Smart Grouping</label>
        </div>
        <button id="search-button">Search ETAs</button>
      </div>

      <div id="status-messages"></div>
      <div id="stop-selection-area"></div>
      <div id="eta-results-area"></div>
      <div id="legend">
        <p><strong>Legend:</strong></p>
        <p><span class="scheduled-eta">Grey Text / Italic</span>: Scheduled Bus</p>
        <p>
          <span>*, !, ^</span>: See "Remarks" column for details.
        </p>
        <p>Route colors indicate service type (e.g., Overnight, Airport).</p>
      </div>
    </div>

    <script>
      const API_BASE_URL = "https://data.etabus.gov.hk/v1/transport/kmb";
      const STOP_CACHE_KEY = "kmb_stop_data_cache";
      const CACHE_EXPIRY_HOURS = 23; // Cache static data for almost a day

      const OVERRIDE_WORDS = new Set([
        "KMB", "LWB", "MTR", "BBI", "PTI", "McDonald's", "HSBC",
        "NT", "KLN", "HK", "Rd", "St", "Ave", "FEHD", "LCSD",
        "(N)", "(S)", "(E)", "(W)", "I", "II", "III", "IV", "V"
      ]);

      const stopNameInput = document.getElementById("stop-name-input");
      const routeFilterInput = document.getElementById("route-filter-input");
      const smartGroupingCheckbox = document.getElementById("smart-grouping-checkbox");
      const searchButton = document.getElementById("search-button");
      const statusMessagesDiv = document.getElementById("status-messages");
      const stopSelectionAreaDiv = document.getElementById("stop-selection-area");
      const etaResultsAreaDiv = document.getElementById("eta-results-area");
      const countdownToggle = document.getElementById('countdownToggle');
      const darkModeToggle = document.getElementById('darkModeToggle');
      
      let stopNameCache = {}; // stopId -> {name_en, name_tc}
      let activeEtaCells = []; // For countdown updates
      let countdownUpdateInterval = null;
      let currentSearchContext = null; // For auto-refresh
      let refreshTimers = {}; // { timerId: { timeout: handle, interval: handle } }

      function saveToCache(key, data) {
        const cacheEntry = { timestamp: new Date().getTime(), data: data };
        localStorage.setItem(key, JSON.stringify(cacheEntry));
      }

      function loadFromCache(key) {
        const item = localStorage.getItem(key);
        if (!item) return null;
        try { return JSON.parse(item); }
        catch (e) { localStorage.removeItem(key); return null; }
      }

      function saveSetting(key, value) {
        localStorage.setItem(key, JSON.stringify(value));
      }

      function loadSetting(key, defaultValue) {
        const item = localStorage.getItem(key);
        if (item === null) return defaultValue;
        try { return JSON.parse(item); }
        catch (e) { console.error(`Error loading setting ${key}:`, e); localStorage.removeItem(key); return defaultValue; }
      }

      function isCacheValid(cacheEntry, expiryHours = CACHE_EXPIRY_HOURS) {
        if (!cacheEntry || !cacheEntry.timestamp) return false;
        const now = new Date().getTime();
        const cacheTime = new Date(cacheEntry.timestamp);
        
        // API data updates at 05:00 daily. Cache is valid until the next 05:00.
        let nextUpdateTime = new Date(cacheTime);
        nextUpdateTime.setHours(5, 0, 0, 0); // Set to 05:00 on the cache date
        if (cacheTime.getHours() >= 5) { // If cache was made on or after 5 AM
            nextUpdateTime.setDate(nextUpdateTime.getDate() + 1); // Valid until 5 AM next day
        }
        // If cache was made before 5 AM, it's valid until 5 AM on the same day.
        return now < nextUpdateTime.getTime();
      }

      async function fetchData(url) {
        console.log(`Fetching data from: ${url}`);
        try {
          const response = await fetch(url);
          if (!response.ok) {
            const errorBody = await response.text();
            console.error(`HTTP error! Status: ${response.status}, URL: ${url}, Body: ${errorBody}`);
            throw new Error(`API Error ${response.status} for ${url}. Check console.`);
          }
          const data = await response.json();
          console.log(`Successfully fetched data from: ${url}`);
          return data;
        } catch (error) { 
            console.error(`Fetch error for URL ${url}:`, error); 
            throw error; // Re-throw to be caught by caller
        }
      }

      async function getStopList() {
        let cached = loadFromCache(STOP_CACHE_KEY);
        if (cached && isCacheValid(cached)) {
          console.log("Using cached stop list.");
          // Ensure data is in expected array format and processed
          return Array.isArray(cached.data) ? cached.data.map(entry => entry.name_en ? entry : processStopRouteEntry(entry)) : [];
        }
        console.log("Fetching fresh stop list...");
        const data = await fetchData(`${API_BASE_URL}/stop`);
        if (!data || !data.data || !Array.isArray(data.data)) { // Check if data.data is an array
            console.error("No data received from /stop API or data.data is not an array");
            throw new Error("Failed to fetch stop list: Invalid API response format.");
        }
        const processedData = data.data.map(processStopRouteEntry);
        saveToCache(STOP_CACHE_KEY, processedData);
        console.log("Fresh stop list processed and cached.");
        return processedData;
      }
      
      async function getStopEta(stopId) {
        console.log(`Fetching ETA for stop ID: ${stopId}`);
        const data = await fetchData(`${API_BASE_URL}/stop-eta/${stopId}`);
         if (!data || !data.data || !Array.isArray(data.data)) { // Check if data.data is an array
            console.warn(`No ETA data received for stop ${stopId} or data.data is not an array. Returning empty array.`);
            return [];
        }
        return data.data.map(processEtaEntry);
      }

      function customTitleCase(str) {
        if (!str) return "";
        return str.replace(/\w\S*/g, (txt) => {
            const upperTxt = txt.toUpperCase();
            if (OVERRIDE_WORDS.has(upperTxt) || OVERRIDE_WORDS.has(txt)) return OVERRIDE_WORDS.has(upperTxt) ? upperTxt : txt;
            return txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase();
        });
      }

      function processName(name) {
        if (!name) return "";
        name = name.replace(/(BBI)-/gi, "$1 - ").replace(/(轉車站)-/g, "$1 - ");
        return customTitleCase(name.trim());
      }
      
      function processStopRouteEntry(entry) {
        return { ...entry, name_en: processName(entry.name_en), name_tc: entry.name_tc, name_sc: entry.name_sc, orig_en: entry.orig_en ? processName(entry.orig_en) : undefined, dest_en: entry.dest_en ? processName(entry.dest_en) : undefined };
      }

      function processEtaEntry(entry) { return { ...entry, dest_en: processName(entry.dest_en) }; }

      function parsePlatformFromStopName(stopNameEn) {
        if (!stopNameEn) return { baseName: stopNameEn, platform: null };
        const bbiMatch = stopNameEn.match(/^(.*?\sBBI)\s*-\s*(.*)$/i);
        if (bbiMatch) return { baseName: bbiMatch[1].trim(), platform: bbiMatch[2].trim() };
        const platformMatch = stopNameEn.match(/^(.*?)\s*\(([A-Z0-9]+)\)$/i);
        if (platformMatch) return { baseName: platformMatch[1].trim(), platform: platformMatch[2].trim() };
        const trailingLetterMatch = stopNameEn.match(/^(.*?)\s+([A-Z])$/i);
        if (trailingLetterMatch && trailingLetterMatch[1].length > 3) return { baseName: trailingLetterMatch[1].trim(), platform: trailingLetterMatch[2].trim() };
        return { baseName: stopNameEn, platform: null };
      }

      function setStatus(message, type = "info", isUpdate = false) {
        if (isUpdate && type === 'loading') {
            console.log(`Silent update status: ${message}`); // Log silent updates instead of showing UI
            return;
        }
        statusMessagesDiv.textContent = message;
        statusMessagesDiv.className = `status-${type}`;
        statusMessagesDiv.style.display = "block";
        setTimeout(() => { statusMessagesDiv.classList.add("status-visible"); }, 10);
      }

      function clearStatus() {
        statusMessagesDiv.classList.remove("status-visible");
        const currentMessage = statusMessagesDiv.textContent;
        setTimeout(() => {
            if (statusMessagesDiv.textContent === currentMessage && !statusMessagesDiv.classList.contains("status-visible")) {
                statusMessagesDiv.textContent = "";
                statusMessagesDiv.style.display = "none";
            }
        }, 300);
      }
      
      function getRouteColorClass(routeStr) {
        if (!routeStr) return 'route-normal';
        const route = routeStr.toUpperCase();
        if (route.startsWith('A')) return 'route-A';
        if (route.startsWith('E') || route.startsWith('S')) return 'route-ES';
        if (route.startsWith('P')) return 'route-P';
        if (route.startsWith('N') && !(route.startsWith('NA') || route.startsWith('NE') || route.startsWith('NP'))) return 'route-N';
        const numericMatch = route.match(/^[A-Z]*(\d+)[A-Z]*$/);
        if (numericMatch) {
            const coreNumericPart = numericMatch[1];
            if (coreNumericPart.length === 3) {
                const firstDigit = coreNumericPart.charAt(0);
                if (['1', '3', '6'].includes(firstDigit)) return 'route-136xx';
                if (firstDigit === '9') return 'route-9xx';
            }
        }
        return 'route-normal';
      }

      function formatEtaTime(isoTimestamp) {
        if (!isoTimestamp) return "-";
        try { 
            return new Date(isoTimestamp).toLocaleTimeString('en-GB', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false 
            }); 
        } catch (e) { return "-"; }
      }

      function formatEtaCountdown(isoTimestamp) {
        if (!isoTimestamp) return "-";
        const etaTime = new Date(isoTimestamp).getTime();
        const now = new Date().getTime();
        let diff = Math.round((etaTime - now) / 1000); 
        if (diff <= 0) return diff < -30 ? "Departed" : "Due"; 
        const minutes = Math.floor(diff / 60);
        const seconds = diff % 60;
        return `${minutes}m ${seconds.toString().padStart(2, '0')}s`;
      }

      function formatRouteNumberForDisplay(routeStr) { return routeStr || '-'; }

      function parseRouteForSorting(routeStr) {
        if (!routeStr) return { prefix: '', mainNumStr: '', mainNumLen: 0, suffix: '', original: '' };
        const upperRoute = routeStr.toUpperCase();
        const match = upperRoute.match(/^([A-Z]*)(\d*)([A-Z]*)$/);
        let prefix = '', mainNumStr = '', suffix = '';
        if (match) { prefix = match[1] || ''; mainNumStr = match[2] || ''; suffix = match[3] || ''; }
        else { prefix = upperRoute; }
        return { prefix: prefix, mainNumStr: mainNumStr, mainNumLen: mainNumStr.length, suffix: suffix, original: routeStr };
      }

      function setupMarquees() {
        document.querySelectorAll('.eta-dest-en-cell .marquee-text-wrapper').forEach(wrapper => {
            const span = wrapper.querySelector('span');
            if (span && wrapper.offsetWidth > 0 && span.offsetWidth > wrapper.offsetWidth) {
                wrapper.classList.add('scrolling');
            } else {
                wrapper.classList.remove('scrolling');
            }
        });
      }

      function renderEtaTable(stopIdentifier, etasFromApi, isGrouped = false, platformForTitle = null, showCountdown = false) {
        const container = document.createElement("div");
        container.className = "eta-table-container";
        const title = document.createElement("h3");
        if (isGrouped) title.textContent = `ETAs for ${stopIdentifier.groupName} ${platformForTitle ? `- Platform: ${platformForTitle}` : ''}`;
        else title.textContent = `ETAs for ${stopIdentifier.name_en} / ${stopIdentifier.name_tc}`;
        container.appendChild(title);

        if (!etasFromApi || etasFromApi.length === 0) {
          const p = document.createElement("p");
          p.textContent = "No ETA data available for this stop/filter at the moment.";
          container.appendChild(p);
          etaResultsAreaDiv.appendChild(container);
          return;
        }

        const table = document.createElement("table");
        table.className = "eta-results";
        const thead = table.createTHead();
        const headerRow = thead.insertRow();
        const headersBase = ["Rt.", "Dest(EN)", "目的地", "ETA 1", "ETA 2", "ETA 3", "Remarks"];
        let headers = [...headersBase]; 
        const showPlatformColumn = isGrouped && !platformForTitle && groupContainsMultiplePlatforms(stopIdentifier, etasFromApi);
        if (showPlatformColumn) headers.splice(1, 0, "Plat.");
        headers.forEach(text => { const th = document.createElement("th"); th.textContent = text; headerRow.appendChild(th); });
        
        const tbody = table.createTBody();
        const fragment = document.createDocumentFragment();
        const remarkSymbols = ['*', '!', '^', '#', '$', '%'];
        let globalRemarkSymbolIndex = 0; 
        
        const processedGroupedEtas = {};
        const committedServiceTypes = {};
        etasFromApi.forEach(eta => {
            const primaryKey = `${eta.route}-${eta.dir}-${eta.dest_en}-${eta.dest_tc}`;
            if (!committedServiceTypes[primaryKey]) committedServiceTypes[primaryKey] = eta.service_type;
            if (eta.service_type === committedServiceTypes[primaryKey]) {
                if (!processedGroupedEtas[primaryKey]) {
                     processedGroupedEtas[primaryKey] = { details: { ...eta }, timedEtas: [], remarksOnly: []  };
                }
                if (eta.eta) processedGroupedEtas[primaryKey].timedEtas.push(eta);
                else if (eta.rmk_en || eta.rmk_tc || eta.rmk_sc) processedGroupedEtas[primaryKey].remarksOnly.push(eta);
            }
        });

        const sortedEtaGroups = Object.values(processedGroupedEtas).sort((groupA, groupB) => {
            const routeA = parseRouteForSorting(groupA.details.route);
            const routeB = parseRouteForSorting(groupB.details.route);
            const hasTimedEtasA = groupA.timedEtas.length > 0;
            const hasTimedEtasB = groupB.timedEtas.length > 0;
            if (hasTimedEtasA && !hasTimedEtasB) return -1; if (!hasTimedEtasA && hasTimedEtasB) return 1;
            if (routeA.prefix < routeB.prefix) return -1; if (routeA.prefix > routeB.prefix) return 1;
            const mainNumLenA = routeA.mainNumLen !== undefined ? routeA.mainNumLen : 0;
            const mainNumLenB = routeB.mainNumLen !== undefined ? routeB.mainNumLen : 0;
            if (mainNumLenA < mainNumLenB) return -1; if (mainNumLenA > mainNumLenB) return 1;
            if (routeA.mainNumStr < routeB.mainNumStr) return -1; if (routeA.mainNumStr > routeB.mainNumStr) return 1;
            if (routeA.suffix < routeB.suffix) return -1; if (routeA.suffix > routeB.suffix) return 1;
            return 0;
        });

        sortedEtaGroups.forEach(group => {
            const timedEtas = group.timedEtas.sort((a, b) => new Date(a.eta) - new Date(b.eta));
            const allRemarksForDisplayForRow = new Map();
            let rowIsExpandable = false;
            let expansionDetails = [];

            timedEtas.slice(0, 3).forEach(etaEntry => {
                if (etaEntry && etaEntry.eta) {
                    const remarkText = etaEntry.rmk_en || etaEntry.rmk_tc || "";
                    const isSched = remarkText === "Scheduled Bus" || remarkText === "原定班次";
                    if (remarkText && !isSched) {
                        rowIsExpandable = true;
                        if (!allRemarksForDisplayForRow.has(remarkText)) {
                            allRemarksForDisplayForRow.set(remarkText, remarkSymbols[globalRemarkSymbolIndex % remarkSymbols.length]);
                            globalRemarkSymbolIndex++;
                        }
                    }
                    expansionDetails.push({
                        time: formatEtaTime(etaEntry.eta),
                        countdown: formatEtaCountdown(etaEntry.eta),
                        isDueOrDeparted: new Date(etaEntry.eta).getTime() <= new Date().getTime(),
                        remark: remarkText,
                        isScheduled: isSched,
                        etaTimestamp: etaEntry.eta
                    });
                } else if (etaEntry) {
                     expansionDetails.push({ time: "-", countdown: "-", remark: etaEntry.rmk_en || etaEntry.rmk_tc || "", isScheduled: false, etaTimestamp: null });
                } else {
                     expansionDetails.push({ time: "-", countdown: "-", remark: "", isScheduled: false, etaTimestamp: null }); // Placeholder for empty slots
                }
            });

            if (timedEtas.length > 0) {
                const row = document.createElement("tr");
                row.classList.add("eta-data-row");
                if (rowIsExpandable) row.classList.add("is-expandable");
                const firstEta = timedEtas[0]; 
                
                const routeCell = document.createElement("td");
                routeCell.classList.add(getRouteColorClass(firstEta.route), "eta-route-cell");
                routeCell.innerHTML = `<span class="route-tag">${formatRouteNumberForDisplay(firstEta.route)}</span>`;
                row.appendChild(routeCell);
                
                if (showPlatformColumn) {
                    const platCell = document.createElement("td");
                    const originalStopDetails = stopNameCache[firstEta.stop]; 
                    platCell.textContent = originalStopDetails ? parsePlatformFromStopName(originalStopDetails.name_en).platform || '-' : '-';
                    platCell.classList.add("eta-platform-cell");
                    row.appendChild(platCell);
                }

                const destEnCell = document.createElement("td");
                destEnCell.classList.add("eta-dest-en-cell");
                const marqueeWrapper = document.createElement('div');
                marqueeWrapper.className = 'marquee-text-wrapper';
                const marqueeSpan = document.createElement('span');
                marqueeSpan.textContent = firstEta.dest_en;
                marqueeWrapper.appendChild(marqueeSpan);
                destEnCell.appendChild(marqueeWrapper);
                row.appendChild(destEnCell);

                const destTcCell = document.createElement("td");
                destTcCell.textContent = firstEta.dest_tc;
                destTcCell.classList.add("eta-dest-tc-cell");
                row.appendChild(destTcCell);

                for (let i = 0; i < 3; i++) {
                    const td = document.createElement("td");
                    td.classList.add("desktop-eta-cell");
                    if (timedEtas[i]) {
                        const isScheduled = timedEtas[i].rmk_en === "Scheduled Bus" || timedEtas[i].rmk_tc === "原定班次";
                        td.dataset.etaTimestamp = timedEtas[i].eta; 
                        let etaDisplayContent = (showCountdown && !isScheduled && new Date(timedEtas[i].eta) > new Date()) ? formatEtaCountdown(timedEtas[i].eta) : formatEtaTime(timedEtas[i].eta);
                        let remarkText = timedEtas[i].rmk_en || timedEtas[i].rmk_tc || "";
                        let highlightClass = (i === 0 && timedEtas[i].eta) ? " first-eta-highlight" : "";
                        let displayHtml = `<span class="eta-time-value${highlightClass}">${etaDisplayContent}</span>`;
                        if (isScheduled) td.classList.add("scheduled-eta");
                        if (remarkText && !isScheduled) {
                            const symbol = allRemarksForDisplayForRow.get(remarkText);
                            if(symbol) displayHtml += `<span class="remark-symbol">${symbol}</span>`;
                        }
                        td.innerHTML = displayHtml;
                        if (showCountdown && !isScheduled && timedEtas[i].eta && new Date(timedEtas[i].eta) > new Date()) activeEtaCells.push(td);
                    } else td.textContent = "-";
                    row.appendChild(td);
                }

                const mobileEtasTd = document.createElement("td");
                mobileEtasTd.className = "mobile-etas-td-container";
                const mobileEtasGroup = document.createElement("div");
                mobileEtasGroup.className = "mobile-etas-group";
                timedEtas.slice(0, 3).forEach((etaEntry, index) => {
                    if (etaEntry && etaEntry.eta) {
                        const etaItemDiv = document.createElement("div");
                        etaItemDiv.className = "mobile-eta-item eta-item-" + index;
                        etaItemDiv.dataset.etaTimestamp = etaEntry.eta;
                        const isScheduled = etaEntry.rmk_en === "Scheduled Bus" || etaEntry.rmk_tc === "原定班次";
                        if (isScheduled) etaItemDiv.classList.add("scheduled-eta");
                        let mobileEtaText = (showCountdown && !isScheduled && new Date(etaEntry.eta) > new Date()) ? formatEtaCountdown(etaEntry.eta) : formatEtaTime(etaEntry.eta);
                        let mobileDisplayHtml = `<span>${mobileEtaText}</span>`;
                        const remarkText = etaEntry.rmk_en || etaEntry.rmk_tc || "";
                        if (remarkText && !isScheduled) {
                            const symbol = allRemarksForDisplayForRow.get(remarkText);
                            if (symbol) mobileDisplayHtml += `<span class="remark-symbol-mobile">${symbol}</span>`;
                        }
                        etaItemDiv.innerHTML = mobileDisplayHtml;
                        mobileEtasGroup.appendChild(etaItemDiv);
                        if (showCountdown && !isScheduled && new Date(etaEntry.eta) > new Date()) activeEtaCells.push(etaItemDiv);
                    }
                });
                mobileEtasTd.appendChild(mobileEtasGroup);
                row.appendChild(mobileEtasTd);

                const remarksCell = document.createElement("td");
                remarksCell.classList.add("eta-remarks-cell");
                let remarksContent = "";
                allRemarksForDisplayForRow.forEach((symbol, text) => { remarksContent += `<p style="margin:0; padding:0;">${symbol} ${text}</p>`; });
                remarksCell.innerHTML = remarksContent || "-";
                row.appendChild(remarksCell);
                fragment.appendChild(row);

                if (rowIsExpandable) {
                    const expansionRow = document.createElement("tr");
                    expansionRow.className = "mobile-expansion-row";
                    const expansionCell = document.createElement("td");
                    expansionCell.className = "mobile-expansion-cell";
                    expansionCell.colSpan = headers.length; 
                    
                    expansionDetails.forEach(detail => {
                        if (!detail.etaTimestamp && !detail.remark) return; // Skip empty placeholders
                        const itemDiv = document.createElement("div");
                        itemDiv.className = "mobile-expansion-content-item";
                        if (detail.isScheduled) itemDiv.classList.add("scheduled-eta");
                        let timeToShow = showCountdown && !detail.isScheduled && detail.etaTimestamp && new Date(detail.etaTimestamp) > new Date() ? detail.countdown : detail.time;
                        if (detail.isDueOrDeparted && !detail.isScheduled && detail.etaTimestamp) timeToShow = detail.countdown;
                        itemDiv.innerHTML = `<span class="eta-time">${timeToShow}</span> <span class="remark-text">${detail.remark || ""}</span>`;
                        expansionCell.appendChild(itemDiv);
                    });
                    expansionRow.appendChild(expansionCell);
                    fragment.appendChild(expansionRow);
                }
            }
            
            if (group.remarksOnly.length > 0) {
                 if (timedEtas.length > 0 && group.remarksOnly.some(r => r.rmk_en || r.rmk_tc || r.rmk_sc)) {
                    const sepRow = document.createElement("tr");
                    sepRow.classList.add("eta-separator"); 
                    const sepCell = document.createElement("td"); sepCell.colSpan = headers.length; 
                    sepRow.appendChild(sepCell); fragment.appendChild(sepRow);
                }
                group.remarksOnly.forEach(remarkEta => { /* ... remark only row logic ... */ });
            }
        });
        tbody.appendChild(fragment);
        container.appendChild(table);
        etaResultsAreaDiv.appendChild(container);
      }

      function groupContainsMultiplePlatforms(groupStopIdentifier, etas) {
        if (!groupStopIdentifier || !groupStopIdentifier.stops || etas.length === 0) return false;
        const platformsInUse = new Set();
        etas.forEach(eta => {
            const stopDetails = stopNameCache[eta.stop];
            if (stopDetails) {
                const platformInfo = parsePlatformFromStopName(stopDetails.name_en);
                if (platformInfo.platform) platformsInUse.add(platformInfo.platform);
                else platformsInUse.add(`no_platform_${eta.stop}`); // Treat no platform as distinct
            }
        });
        return platformsInUse.size > 1;
      }
      
      function updateDisplayedEtaFormat() {
        const showCountdown = countdownToggle.checked;
        activeEtaCells = []; 
        document.querySelectorAll('#eta-results-area td.desktop-eta-cell[data-eta-timestamp], #eta-results-area .mobile-eta-item[data-eta-timestamp]').forEach(cell => {
            const timestamp = cell.dataset.etaTimestamp;
            const isScheduled = cell.classList.contains("scheduled-eta");
            const timeValueElement = cell.classList.contains("mobile-eta-item") ? cell.querySelector('span') : cell.querySelector('.eta-time-value'); // Target inner span for mobile too

            if (timestamp && timeValueElement) {
                const etaDate = new Date(timestamp);
                if (showCountdown && !isScheduled && etaDate > new Date()) {
                    timeValueElement.textContent = formatEtaCountdown(timestamp);
                    activeEtaCells.push(cell); 
                } else {
                    timeValueElement.textContent = formatEtaTime(timestamp);
                }
            }
        });
        if (showCountdown && activeEtaCells.length > 0) startCountdownUpdater();
        else stopCountdownUpdater();
      }

      function scheduleNextMinuteRefresh(refreshFunction, timerId) {
        if (refreshTimers[timerId]) {
            clearTimeout(refreshTimers[timerId].timeout);
            clearInterval(refreshTimers[timerId].interval);
        }
        const now = new Date();
        const seconds = now.getSeconds();
        const milliseconds = now.getMilliseconds();
        let delay = (60 - seconds) * 1000 - milliseconds;
        if (delay <= 0) delay += 60000; 

        console.log(`Scheduling first refresh for ${timerId} in ${delay / 1000}s at ${new Date(Date.now() + delay).toLocaleTimeString()}`);
        const timeout = setTimeout(() => {
            console.log(`Performing initial aligned refresh for ${timerId} at ${new Date().toLocaleTimeString()}`);
            refreshFunction(true); 
            const interval = setInterval(() => {
                console.log(`Performing scheduled refresh for ${timerId} at ${new Date().toLocaleTimeString()}`);
                refreshFunction(true);
            }, 60000);
            refreshTimers[timerId] = { ...refreshTimers[timerId], interval: interval };
        }, delay);
        refreshTimers[timerId] = { timeout: timeout, interval: null };
      }

      function clearRefreshTimer(timerId) {
        if (refreshTimers[timerId]) {
            clearTimeout(refreshTimers[timerId].timeout);
            clearInterval(refreshTimers[timerId].interval);
            delete refreshTimers[timerId];
            console.log(`Cleared refresh timer for ${timerId}`);
        }
      }

      async function handleSearch() {
        const stopQuery = stopNameInput.value.trim();
        const routeFilters = routeFilterInput.value.trim().toUpperCase().split(',').filter(r => r);
        const useSmartGrouping = smartGroupingCheckbox.checked;

        if (!stopQuery) { setStatus("Please enter a bus stop name.", "error"); return; }
        
        etaResultsAreaDiv.innerHTML = ""; stopSelectionAreaDiv.innerHTML = ""; 
        activeEtaCells = []; 
        stopCountdownUpdater(); 
        clearRefreshTimer('mainSearch');
        currentSearchContext = { stopQuery, routeFilters, useSmartGrouping, type: null, data: null }; 
        setStatus("Searching...", "loading");

        try {
          const allStops = await getStopList();
          stopNameCache = {}; 
          allStops.forEach(s => stopNameCache[s.stop] = {name_en: s.name_en, name_tc: s.name_tc});
          const lowerStopQuery = stopQuery.toLowerCase();
          let matchedStops = allStops.filter(stop => 
            (stop.name_en && stop.name_en.toLowerCase().includes(lowerStopQuery)) ||
            (stop.name_tc && stop.name_tc.includes(stopQuery)) || 
            (stop.name_sc && stop.name_sc.includes(stopQuery))
          );
          matchedStops.sort((a,b) => (a.name_en || "").localeCompare(b.name_en || ""));

          if (matchedStops.length === 0) { setStatus("No stops found matching your query.", "info"); return; }
          
          if (useSmartGrouping) {
            currentSearchContext.type = 'smartGroup';
            const groupedByBaseName = {};
            matchedStops.forEach(stop => {
                const { baseName } = parsePlatformFromStopName(stop.name_en);
                if (!groupedByBaseName[baseName]) groupedByBaseName[baseName] = { groupName: baseName, stops: [] };
                groupedByBaseName[baseName].stops.push(stop);
            });
            currentSearchContext.data = groupedByBaseName;
            for (const groupKey in groupedByBaseName) {
                const group = groupedByBaseName[groupKey];
                let allEtasForGroup = [];
                setStatus(`Fetching ETAs for group: ${group.groupName}...`, "loading");
                const etaPromises = group.stops.map(stop => getStopEta(stop.stop).catch(() => []));
                const etaResultsArray = await Promise.all(etaPromises);
                etaResultsArray.forEach(etas => allEtasForGroup.push(...etas));
                if (routeFilters.length > 0) {
                    allEtasForGroup = allEtasForGroup.filter(eta => routeFilters.includes(eta.route.toUpperCase()));
                }
                if (allEtasForGroup.length > 0 || group.stops.length > 0) {
                     renderEtaTable(group, allEtasForGroup, true, null, countdownToggle.checked);
                }
            }
          } else {
            currentSearchContext.type = 'individual';
            currentSearchContext.data = matchedStops;
            for (const stop of matchedStops) {
                setStatus(`Fetching ETAs for: ${stop.name_en}...`, "loading");
                let etasFromApi = await getStopEta(stop.stop);
                if (routeFilters.length > 0) etasFromApi = etasFromApi.filter(eta => routeFilters.includes(eta.route.toUpperCase()));
                renderEtaTable(stop, etasFromApi, false, null, countdownToggle.checked);
            }
          }
          
          if (etaResultsAreaDiv.innerHTML === "") {
            setStatus("No ETA data found for your query/filters.", "info");
          } else {
            clearStatus();
            scheduleNextMinuteRefresh(refreshCurrentEtas, 'mainSearch');
          }
          setupMarquees(); 
          updateDisplayedEtaFormat(); 
        } catch (error) {
          console.error("Error in handleSearch:", error);
          setStatus(`Search Error: ${error.message}. Check console.`, "error");
        }
      }

                    etaResultsArray.forEach(etas => allEtasForGroup.push(...etas));
                    if (routeFilters.length > 0) allEtasForGroup = allEtasForGroup.filter(eta => routeFilters.includes(eta.route.toUpperCase()));

                }
            } else if (type === 'individual' && data) {

                    if (routeFilters.length > 0) etasFromApi = etasFromApi.filter(eta => routeFilters.includes(eta.route.toUpperCase()));

                }

            // Restore scroll position
            document.querySelectorAll('.eta-table-container').forEach(container => {

      function startCountdownUpdater() {
        stopCountdownUpdater(); 
        if (activeEtaCells.length > 0 && countdownToggle.checked) {
          countdownUpdateInterval = setInterval(() => {
            activeEtaCells = activeEtaCells.filter(cell => {
              if (!document.body.contains(cell)) return false; 
              const timestamp = cell.dataset.etaTimestamp;
              const targetElement = cell.classList.contains("mobile-eta-item") ? cell.querySelector('span') : cell.querySelector('.eta-time-value');
              
              if (timestamp && targetElement && !cell.classList.contains('scheduled-eta')) {
                const etaDate = new Date(timestamp);
                if (etaDate > new Date()) {
                    targetElement.textContent = formatEtaCountdown(timestamp);
                } else {
                    const now = new Date().getTime();
                    let diff = Math.round((etaDate.getTime() - now) / 1000);
                    targetElement.textContent = diff < -30 ? "Departed" : "Due";
                    return false; 
                }
              } else if (cell.classList.contains('scheduled-eta')) {
                  return false; 
              }
              return true; 
            });
            if (activeEtaCells.length === 0) stopCountdownUpdater();
          }, 1000);
        }
      }

      function stopCountdownUpdater() {
        if (countdownUpdateInterval) clearInterval(countdownUpdateInterval);
        countdownUpdateInterval = null;
      }

      searchButton.addEventListener("click", handleSearch);
      stopNameInput.addEventListener("keypress", (event) => { if (event.key === "Enter") handleSearch(); });
      routeFilterInput.addEventListener("keypress", (event) => { if (event.key === "Enter") handleSearch(); });
      
      darkModeToggle.addEventListener('change', (event) => { setDarkMode(event.target.checked); });
      countdownToggle.addEventListener('change', (event) => { setCountdownMode(event.target.checked); });

      etaResultsAreaDiv.addEventListener('dblclick', function(event) {
        const row = event.target.closest('tr.eta-data-row.is-expandable');
        if (!row) return;
        const expansionRow = row.nextElementSibling;
        if (expansionRow && expansionRow.classList.contains('mobile-expansion-row')) {
            const isVisible = expansionRow.classList.toggle('is-visible');
            row.classList.toggle('is-expanded', isVisible);
        }
      });
      
      function setDarkMode(isDark) {
        document.body.classList.toggle('dark-mode', isDark);
        saveSetting('theme', isDark ? 'dark' : 'light');
        if (darkModeToggle) darkModeToggle.checked = isDark;
      }

      function setCountdownMode(showCountdown) {
        saveSetting('showCountdown', showCountdown);
        if(countdownToggle) countdownToggle.checked = showCountdown;
        updateDisplayedEtaFormat(); 
      }
      
      const savedTheme = loadSetting('theme', (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light');
      setDarkMode(savedTheme === 'dark');
      const savedCountdownPreference = loadSetting('showCountdown', false); 
      setCountdownMode(savedCountdownPreference);
      setStatus("Enter a stop name to begin.", "info");
    </script>
