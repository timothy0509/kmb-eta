<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta
    name="viewport"
    content="width=device-width,initial-scale=1.0,maximum-scale=1.0"
  />
  <title>TimoETA – Sing Yin</title>
  <!-- apply saved theme immediately -->
  <script>
    (function(){
      const t = localStorage.getItem('theme');
      if (t === 'dark') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
  <link rel="stylesheet" href="styles/style.css"/>
</head>
<body>
  <div class="container fade-in">
    <header class="fade-in">
      <h1>TimoETA – Sing Yin</h1>
      <div class="header-controls">
        <div class="theme-switch-wrapper">
          <label class="theme-switch">
            <input type="checkbox" id="themeToggle"/>
            <span class="slider"></span>
          </label>
          <span class="theme-label">Dark Mode</span>
          <label for="langSelect" class="lang-label">Language</label>
          <select id="langSelect" class="material-select">
            <option value="en">English</option>
            <option value="tc">繁體</option>
            <option value="sc">简体</option>
          </select>
        </div>
      </div>
    </header>

    <div id="results"></div>

    <footer class="app-footer fade-in">
      Made by Timothy
    </footer>
  </div>

  <script>
    // --- PRESETS ---
    const PRESETS = [
      {
        groupName: "Pak Hung House – East Bound",
        stops: [
          { id: "942E95B4336BDFA7", platform: "WT230" },
          { id: "29740CCBBD82FC33", platform: "WT231" },
          { id: "9A16E73DC0B9AF6C", platform: "WT232" }
        ]
      },
      {
        groupName: "Pak Hung House – West Bound",
        stops: [
          { id: "58611212645F0AB1", platform: "WT614" },
          { id: "3BA9C90738A8600D", platform: "WT615" }
        ]
      }
    ];

    // --- API & i18n ---
    const API = {
      STOP_ETA: id =>
        `https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${id}`
    };
    const LANGS = {
      en: {
        tableHeaders: {
          Route: "Route",
          Destination: "Destination",
          Platform: "Platform",
          ETA1: "ETA1",
          ETA2: "ETA2",
          ETA3: "ETA3",
          Remarks: "Remarks"
        },
        noEtas: "No ETAs available"
      },
      tc: {
        tableHeaders: {
          Route: "路線",
          Destination: "目的地",
          Platform: "月台",
          ETA1: "到站1",
          ETA2: "到站2",
          ETA3: "到站3",
          Remarks: "備註"
        },
        noEtas: "沒有到站時間"
      },
      sc: {
        tableHeaders: {
          Route: "路线",
          Destination: "目的地",
          Platform: "站台",
          ETA1: "到站1",
          ETA2: "到站2",
          ETA3: "到站3",
          Remarks: "备注"
        },
        noEtas: "没有到站时间"
      }
    };
    const SUFFIX = { en: "en", tc: "tc", sc: "sc" };

    // --- Helpers ---
    function formatTimeOnly(iso) {
      return iso
        ? new Date(iso).toLocaleTimeString("en-GB", {
            hour12: false,
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit"
          })
        : "";
    }
    function parseRouteStr(r) {
      const m = r.match(/^([A-Za-z]*)(\d+)([A-Za-z]*)$/);
      return m
        ? { prefix: m[1], num: +m[2], suffix: m[3] }
        : { prefix: r, num: 0, suffix: "" };
    }
    function compareRoute(a, b) {
      const x = parseRouteStr(a.route),
            y = parseRouteStr(b.route);
      if (x.prefix !== y.prefix)
        return x.prefix.localeCompare(y.prefix);
      if (x.num !== y.num) return x.num - y.num;
      return x.suffix.localeCompare(y.suffix);
    }
    function routeTagClass(r) {
      const up = r.toUpperCase(),
            { prefix, num } = parseRouteStr(up);
      if (prefix === "A") return "route-A";
      if (/^[ES]/.test(prefix)) return "route-ES";
      if (prefix === "HK") return "route-HK";
      if (prefix === "N") return "route-N";
      if (num >= 100 && num < 200) return "route-1XX";
      if (num >= 300 && num < 400) return "route-3XX";
      if (num >= 600 && num < 700) return "route-6XX";
      if (num >= 900 && num < 1000)
        return prefix === "P" ? "route-P9XX" : "route-9XX";
      return "route-normal";
    }
    async function getETAs(id) {
      const r = await fetch(API.STOP_ETA(id)),
            j = await r.json();
      return j.data || [];
    }
    function isMobile() {
      return window.innerWidth <= 576;
    }

    // --- State & Timers ---
    let rowsData = [],
        refreshTimer = null,
        prevIsMobile = isMobile();

    // --- Render ---
    async function renderSingYin() {
      if (refreshTimer) clearInterval(refreshTimer);
      rowsData = [];

      const lang = document.getElementById("langSelect").value,
            suffix = SUFFIX[lang],
            H = LANGS[lang].tableHeaders,
            noEtasTxt = LANGS[lang].noEtas,
            results = document.getElementById("results");
      results.innerHTML = "";

      for (const grp of PRESETS) {
        // group heading
        const h3 = document.createElement("h3");
        h3.textContent = grp.groupName;
        results.appendChild(h3);

        if (isMobile()) {
          // mobile cards
          for (const stop of grp.stops) {
            const data = await getETAs(stop.id);
            // group by route|dest
            const byKey = {};
            data.forEach(e => {
              const destKey = e[`dest_${suffix}`] || e.dest_en;
              const k = `${e.route}|${destKey}`;
              (byKey[k] = byKey[k] || []).push(e);
            });
            Object.values(byKey).forEach(ent => {
              ent.sort((a,b)=>a.eta_seq-b.eta_seq);
              // pick service-type priority 1,2,3
              const svcOrder = ["1","2","3"];
              let chosen = [];
              for (const svc of svcOrder) {
                const tmp = ent.filter(x=>
                  String(x.service_type)===svc && x.eta
                );
                if (tmp.length) { chosen = tmp; break; }
              }
              if (!chosen.length) chosen = ent.filter(x=>x.eta);
              const sliced = [
                chosen[0]||{}, chosen[1]||{}, chosen[2]||{}
              ];
              const hasAny = sliced.some(x=>x.eta);
              const remarksArr = ent
                .filter(x=>x[`rmk_${suffix}`] && x.rmk_en!=="Scheduled Bus")
                .map(x=>x[`rmk_${suffix}`]);
              const noetaTxt = remarksArr[0]||noEtasTxt;

              // build card
              const card = document.createElement("div");
              card.className = "mobile-card fade-in";

              // route tag
              const c1 = document.createElement("div");
              c1.className = "mobile-route";
              const tag = document.createElement("span");
              tag.className = "route-tag " + routeTagClass(sliced[0].route||"");
              tag.textContent = sliced[0].route||"";
              c1.appendChild(tag);

              // destination
              const c2 = document.createElement("div");
              c2.className = "mobile-dest" +
                (hasAny ? "" : " mobile-noeta-text");
              c2.textContent = sliced[0][`dest_${suffix}`] || sliced[0].dest_en || "";

              // times container
              const c3 = document.createElement("div");
              c3.className = "mobile-times";
              if (hasAny) {
                sliced.filter(x=>x.eta).forEach((x,i)=>{
                  const d = document.createElement("div");
                  d.className = "eta-time";
                  if (i>0 && x.rmk_en==="Scheduled Bus")
                    d.classList.add("scheduled-eta");
                  d.textContent = formatTimeOnly(x.eta);
                  c3.appendChild(d);
                });
              } else {
                const d = document.createElement("div");
                d.className = "mobile-noeta";
                d.textContent = noetaTxt;
                c3.appendChild(d);
              }

              card.append(c1,c2,c3);

              // info / warning toggle
              const toggleBtn = document.createElement("button");
              toggleBtn.className = "mobile-toggle-btn";
              if (!hasAny) toggleBtn.classList.add("warning");
              toggleBtn.innerHTML = hasAny ? "&#9432;" : "&#9888;";
              toggleBtn.setAttribute("aria-label", "Toggle details");
              toggleBtn.setAttribute("aria-expanded", "false");
              toggleBtn.addEventListener("click", e=>{
                e.stopPropagation();
                const ex = card.querySelector(".mobile-details");
                if (ex) {
                  ex.remove();
                  toggleBtn.setAttribute("aria-expanded","false");
                  card.classList.remove("expanded");
                } else {
                  const md = document.createElement("div");
                  md.className = "mobile-details";
                  md.innerHTML =
                    `<div><strong>Stop ID:</strong> ${stop.id}</div>`+
                    `<div><strong>Platform:</strong> ${stop.platform}</div>`+
                    `<div><strong>Remarks:</strong> ${
                      hasAny
                        ? remarksArr.join("; ")
                        : noetaTxt
                    }</div>`;
                  card.appendChild(md);
                  toggleBtn.setAttribute("aria-expanded","true");
                  card.classList.add("expanded");
                }
              });
              card.append(toggleBtn);

              results.appendChild(card);
              rowsData.push({
                stopId: stop.id,
                route: sliced[0]?.route,
                mobileContainer: c3
              });
            });
          }

        } else {
          // desktop table
          const wrap = document.createElement("div");
          wrap.className = "eta-table-container";
          const table = document.createElement("table");
          table.className = "eta-results";
          const ths = [
            H.Route, H.Destination, H.Platform,
            H.ETA1, H.ETA2, H.ETA3, H.Remarks
          ].map(h=>`<th>${h}</th>`).join("");
          table.innerHTML = `<thead><tr>${ths}</tr></thead>`;
          const tbody = document.createElement("tbody");
          let rows = [];

          for (const stop of grp.stops) {
            const data = await getETAs(stop.id);
            const byKey = {};
            data.forEach(e=>{
              const destKey = e[`dest_${suffix}`] || e.dest_en;
              const k = `${e.route}|${destKey}`;
              (byKey[k] = byKey[k]||[]).push(e);
            });
            Object.values(byKey).forEach(ent=>{
              ent.sort((a,b)=>a.eta_seq-b.eta_seq);
              const svcOrder = ["1","2","3"];
              let chosen = [];
              for (const svc of svcOrder) {
                const tmp = ent.filter(
                  x=>String(x.service_type)===svc && x.eta
                );
                if (tmp.length) { chosen = tmp; break; }
              }
              if (!chosen.length) chosen = ent.filter(x=>x.eta);
              const sliced = [
                chosen[0]||{}, chosen[1]||{}, chosen[2]||{}
              ];
              const base = chosen[0]||ent[0]||{};
              const numberedRemarks = sliced
                .filter(
                  x=>x.eta
                     && x.rmk_en!=="Scheduled Bus"
                     && x[`rmk_${suffix}`]
                )
                .map(
                  x=>`ETA${x.eta_seq}: ${x[`rmk_${suffix}`]}`
                );
              const noetaRemarks = ent
                .filter(
                  x=>x.rmk_en!=="Scheduled Bus"
                     && x[`rmk_${suffix}`]
                )
                .map(x=>x[`rmk_${suffix}`]);
              rows.push({
                stopId: stop.id,
                route: base.route,
                dest: base[`dest_${suffix}`]||base.dest_en,
                platform: stop.platform,
                etas: sliced,
                numberedRemarks,
                noetaRemarks
              });
            });
          }

          rows.sort((a,b)=>{
            const aL = a.etas.some(x=>x.eta),
                  bL = b.etas.some(x=>x.eta);
            if (aL!==bL) return aL?-1:1;
            return compareRoute(a,b);
          });

          rows.forEach(r=>{
            const noEta = !r.etas.some(x=>x.eta),
                  tr = document.createElement("tr");
            tr.className = noEta
              ? "no-eta-row eta-data-row"
              : "eta-data-row";

            // route
            const tdRt = document.createElement("td");
            tdRt.className = "eta-route-cell";
            const sp = document.createElement("span");
            sp.className = "route-tag "+routeTagClass(r.route);
            sp.textContent = r.route;
            tdRt.appendChild(sp);
            tr.appendChild(tdRt);

            // dest
            const tdD = document.createElement("td");
            tdD.textContent = r.dest;
            if (noEta) tdD.classList.add("no-eta-text");
            tr.appendChild(tdD);

            // platform
            const tdP = document.createElement("td");
            tdP.textContent = r.platform;
            if (noEta) tdP.classList.add("no-eta-text");
            tr.appendChild(tdP);

            if (noEta) {
              const tdR = document.createElement("td");
              tdR.colSpan = 4;
              tdR.className = "remark-only-cell";
              tdR.textContent = r.noetaRemarks[0]||noEtasTxt;
              tr.appendChild(tdR);
            } else {
              r.etas.forEach(x=>{
                const td = document.createElement("td");
                td.className = "desktop-eta-cell";
                td.textContent = formatTimeOnly(x.eta);
                if (x.rmk_en==="Scheduled Bus")
                  td.classList.add("scheduled-eta");
                tr.appendChild(td);
              });
              const tdR = document.createElement("td");
              tdR.textContent = r.numberedRemarks.join("; ");
              tr.appendChild(tdR);
              rowsData.push({
                stopId: r.stopId,
                route: r.route,
                etaCells: Array.from(tr.querySelectorAll(".desktop-eta-cell")),
                remCell: tdR
              });
            }

            tbody.appendChild(tr);
          });

          table.appendChild(tbody);
          wrap.appendChild(table);
          results.appendChild(wrap);
        }
      }

      refreshTimer = setInterval(renderSingYin, 30000);
    }

    // optional live‐only refresh
    async function refreshSingYin() {
      /* no partial refresh for this page */
    }

    // re-render on lang change or breakpoint change
    document.getElementById("langSelect")
      .addEventListener("change", renderSingYin);
    window.addEventListener("resize", ()=>{
      const now = isMobile();
      if (now !== prevIsMobile) {
        prevIsMobile = now;
        renderSingYin();
      }
    });

    // initial render
    renderSingYin();

    // theme toggle hookup
    const themeToggle = document.getElementById("themeToggle");
    themeToggle.checked = document.documentElement.classList.contains("dark-mode");
    themeToggle.addEventListener("change", e=>{
      document.documentElement.classList.toggle("dark-mode", e.target.checked);
      localStorage.setItem("theme", e.target.checked ? "dark" : "light");
    });
  </script>
</body>
</html>
